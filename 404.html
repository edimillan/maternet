<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página No Encontrada | Mater Admirabilis</title>
    
    <!-- Fuentes e Íconos -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        principal: '#005931',
                        oro: '#EBB300',
                        texto: '#1A252C',
                        fondo: '#f8f9fa'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Netlify Identity Widget (Necesario para redirección de Auth en CMS) -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

    <style>
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        .float-animation {
            animation: float 4s ease-in-out infinite;
        }
    </style>
</head>
<body class="font-sans bg-fondo text-texto min-h-screen flex items-center justify-center relative overflow-hidden px-4">
    
    <!-- Blobs decorativos en el fondo -->
    <div class="absolute top-0 left-0 w-96 h-96 bg-principal/5 rounded-full filter blur-3xl -translate-x-1/2 -translate-y-1/2"></div>
    <div class="absolute bottom-0 right-0 w-96 h-96 bg-oro/10 rounded-full filter blur-3xl translate-x-1/2 translate-y-1/2"></div>

    <div class="max-w-2xl w-full text-center relative z-10 bg-white/80 backdrop-blur-md border border-gray-100 p-8 md:p-12 rounded-[2.5rem] shadow-2xl">
        <!-- Ilustración / Escudo 404 -->
        <div class="relative w-48 h-48 mx-auto mb-8 float-animation flex items-center justify-center">
            <div class="absolute inset-0 bg-principal/10 rounded-full scale-110 animate-pulse"></div>
            <div class="absolute inset-0 bg-oro/20 rounded-full scale-95"></div>
            <div class="relative z-10 text-principal text-8xl font-black tracking-widest">
                404
            </div>
        </div>

        <!-- Mensaje -->
        <h1 class="text-3xl md:text-4xl font-extrabold text-principal mb-4">¡Página No Encontrada!</h1>
        <p class="text-gray-600 text-base md:text-lg mb-8 leading-relaxed max-w-md mx-auto">
            Lo sentimos, la dirección que ingresaste no existe o ha sido movida temporalmente.
        </p>

        <!-- Contador y Redirección -->
        <div class="bg-gray-50 border border-gray-100 rounded-2xl py-3 px-6 mb-8 inline-block">
            <p class="text-sm text-gray-500 font-medium flex items-center justify-center">
                <i class="fas fa-spinner animate-spin text-oro mr-2.5"></i>
                Serás redirigido al inicio en <span id="countdown" class="font-bold text-principal mx-1 text-base">5</span> segundos.
            </p>
        </div>

        <!-- Botones de Acción -->
        <div class="flex flex-col sm:flex-row justify-center items-center gap-4">
            <a href="index.html" class="w-full sm:w-auto px-8 py-3.5 bg-principal hover:bg-[#004224] text-white font-bold rounded-xl shadow-lg transition-all transform hover:-translate-y-0.5 flex items-center justify-center gap-2">
                <i class="fas fa-home"></i> Ir a Inicio
            </a>
            <button onclick="window.history.back()" class="w-full sm:w-auto px-8 py-3.5 bg-white hover:bg-gray-50 text-principal font-bold rounded-xl border border-gray-200 shadow-sm transition-all transform hover:-translate-y-0.5 flex items-center justify-center gap-2">
                <i class="fas fa-arrow-left"></i> Volver Atrás
            </button>
        </div>
    </div>

    <!-- Script de redirección automática -->
    <script>
        let timeLeft = 5;
        const countdownEl = document.getElementById('countdown');
        
        const interval = setInterval(() => {
            timeLeft--;
            countdownEl.textContent = timeLeft;
            
            if (timeLeft <= 0) {
                clearInterval(interval);
                window.location.href = 'index.html';
            }
        }, 1000);

        // Soporte de inicio de sesión Netlify Identity
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) {
                    window.netlifyIdentity.on("login", () => {
                        document.location.href = "/admin/";
                    });
                }
            });
        }
    </script>
</body>
</html>
