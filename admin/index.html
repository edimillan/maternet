<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mater Admirabilis | Panel de Administración</title>
</head>
<body>
  <!-- Carga del core de Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    // Registrar fuentes y Tailwind CSS para que la vista previa dentro del editor del CMS se vea estilizada
    CMS.registerPreviewStyle("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap");
    CMS.registerPreviewStyle("https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css");

    // Interceptar addEventListener para capturar el manejador de mensajes de Decap CMS
    const originalAddEventListener = window.addEventListener;
    const messageListeners = [];
    window.addEventListener = function(type, listener, options) {
      if (type === 'message') {
        messageListeners.push(listener);
      }
      return originalAddEventListener.apply(this, arguments);
    };

    // Escuchador de diagnóstico y puente de orígenes para asegurar la autenticación
    window.addEventListener('message', (event) => {
      console.log('%c[DEBUG CMS] Mensaje recibido en ventana principal:', 'color: #00bcd4; font-weight: bold;', event);
      console.log('Origen del evento:', event.origin);
      console.log('Datos del evento:', event.data);

      if (event.data && typeof event.data === 'string' && event.data.startsWith('authorization:github:success:')) {
        console.log('[DEBUG CMS] Detectado mensaje de éxito de OAuth. Reenviando con variaciones de origen...');
        
        // Generar posibles variaciones del origen para evitar problemas con barras diagonales, localhost o Netlify
        const originsToTry = [
          event.origin,
          event.origin + '/',
          'https://maternet.pages.dev',
          'https://maternet.pages.dev/',
          window.location.origin,
          window.location.origin + '/',
          'https://api.netlify.com'
        ];

        const uniqueOrigins = [...new Set(originsToTry)];

        messageListeners.forEach((listener) => {
          uniqueOrigins.forEach((origin) => {
            try {
              // Fabricar un evento simulado con el origen específico
              const fakeEvent = {
                data: event.data,
                origin: origin,
                source: event.source,
                ports: event.ports,
                stopPropagation: () => {},
                preventDefault: () => {}
              };
              console.log(`[DEBUG CMS] Reenviando a Decap CMS usando origen: "${origin}"`);
              listener(fakeEvent);
            } catch (err) {
              console.warn(`[DEBUG CMS] Error reenviando con origen "${origin}":`, err);
            }
          });
        });
      }
    }, false);
  </script>
</body>
</html>
