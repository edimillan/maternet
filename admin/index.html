<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mater Admirabilis | Panel de Administración</title>
</head>
<body>
  <!-- Carga de localforage para inyección en IndexedDB -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
  <!-- Carga del core de Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    // Registrar fuentes y Tailwind CSS para que la vista previa dentro del editor del CMS se vea estilizada
    CMS.registerPreviewStyle("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap");
    CMS.registerPreviewStyle("https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css");

    // Escuchador para inyectar la sesión desde el popup de GitHub OAuth
    window.addEventListener('message', (event) => {
      if (event.data && typeof event.data === 'string' && event.data.startsWith('authorization:github:success:')) {
        try {
          const rawJson = event.data.replace('authorization:github:success:', '');
          const oauthData = JSON.parse(rawJson);
          
          if (oauthData && oauthData.token) {
            const userObj = {
              token: oauthData.token,
              name: "Administrador",
              login: "admin",
              email: "",
              avatar_url: "",
              backendName: "github"
            };
            
            // 1. Guardar en LocalStorage
            localStorage.setItem('decap-cms-user', JSON.stringify(userObj));
            localStorage.setItem('netlify-cms-user', JSON.stringify(userObj));
            
            // 2. Guardar en IndexedDB (localforage)
            if (window.localforage) {
              const storeDecap = localforage.createInstance({ name: 'decap-cms', storeName: 'keyvaluepairs' });
              const storeNetlify = localforage.createInstance({ name: 'netlify-cms', storeName: 'keyvaluepairs' });

              Promise.all([
                storeDecap.setItem('user', userObj),
                storeNetlify.setItem('user', userObj)
              ]).then(() => {
                window.location.reload();
              }).catch((err) => {
                console.error('Error al escribir en IndexedDB:', err);
                window.location.reload();
              });
            } else {
              window.location.reload();
            }
          }
        } catch (err) {
          console.error('Error al procesar la autenticación:', err);
        }
      }
    }, false);
  </script>
</body>
</html>
