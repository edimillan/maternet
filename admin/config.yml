site_url: https://maternet.pages.dev
backend:
  name: github
  repo: edimillan/maternet
  branch: main
  base_url: https://maternet.pages.dev
  auth_endpoint: api/auth

media_folder: "images"
public_folder: "images"

collections:
  - name: "comunidad_data"
    label: "Comunidad y Eventos"
    files:
      - file: "data/comunidad.json"
        label: "Noticias y Actividades"
        name: "comunidad"
        fields:
          - label: "Noticias y Boletines"
            name: "noticias"
            widget: "list"
            collapsed: true
            summary: "{{fields.titulo}}"
            fields:
              - { label: "ID único", name: "id", widget: "string", hint: "Identificador para la URL. Sin espacios, tildes ni mayúsculas. Ej: dia-madre-2027" }
              - { label: "Título de la Noticia", name: "titulo", widget: "string", hint: "Título atractivo para el listado y la cabecera del boletín." }
              - { label: "Fecha Completa", name: "fecha", widget: "string", hint: "Ej: 25 Mayo 2027" }
              - { label: "Mes Abreviado", name: "mes", widget: "string", hint: "Exactamente 3 letras en mayúsculas. Ej: MAY" }
              - { label: "Día Número", name: "dia", widget: "string", hint: "El número del día del evento. Ej: 25" }
              - { label: "Imagen Destacada", name: "imagen", widget: "image", hint: "Foto principal. Formato WebP sugerido de 800x600px." }
              - { label: "Resumen Breve", name: "resumen", widget: "text", hint: "Extracto corto de 1 o 2 líneas para el listado de novedades." }
              - { label: "Categoría", name: "categoria", widget: "string", hint: "Ej: Académico, Pastoral, Deportes, Institucional" }
              - { label: "Dirigido a", name: "dirigido_a", widget: "string", hint: "Ej: Padres de Familia, Estudiantes, Toda la Comunidad" }
              - { label: "Contenido Completo", name: "contenido", widget: "markdown", hint: "Cuerpo de la noticia redactado con formato enriquecido." }
              - label: "Galería de Fotos del Evento"
                name: "galeria"
                widget: "list"
                collapsed: true
                summary: "Foto {{index}}"
                field: { label: "Imagen", name: "image_path", widget: "image", hint: "Foto de la galería del evento." }
          - label: "Próximas Actividades"
            name: "actividades"
            widget: "list"
            collapsed: true
            summary: "{{fields.titulo}}"
            fields:
              - { label: "ID único", name: "id", widget: "string", hint: "Sin espacios ni tildes. Ej: taller-padres-2027" }
              - { label: "Título de la Actividad", name: "titulo", widget: "string", hint: "Ej: Taller Educativo para Padres" }
              - { label: "Fecha y Hora Display", name: "fecha_display", widget: "string", hint: "Ej: Jueves 04 Junio, 18:00 hrs" }
              - { label: "Tipo / Modalidad", name: "tipo", widget: "select", options: ["Virtual", "Presencial", "Colegio"], hint: "Selecciona si es virtual o presencial." }
              - { label: "Lugar / Ubicación", name: "lugar", widget: "string", hint: "Ej: Coliseo del Colegio, Capilla, Microsoft Teams" }
              - { label: "Organizador", name: "organizador", widget: "string", hint: "Ej: Equipo de Pastoral, Departamento Psicopedagógico" }
              - { label: "Resumen Corto", name: "resumen", widget: "text", hint: "Frase descriptiva corta de la actividad." }
              - { label: "Contenido / Detalles de la Actividad", name: "contenido", widget: "markdown", hint: "Instrucciones, temario o link de ingreso." }

  - name: "inicio_data"
    label: "Configuración Inicio"
    files:
      - file: "data/inicio.json"
        label: "Portada y Niveles Educativos"
        name: "inicio"
        fields:
          - label: "Mosaico de Fotos de Portada (Ideal: 600x450px en WebP)"
            name: "mosaico"
            widget: "list"
            collapsed: true
            summary: "Foto {{index}}"
            max: 8
            min: 6
            field: { label: "Imagen", name: "path", widget: "image" }
          - label: "Nivel Inicial"
            name: "nivel_inicial"
            widget: "object"
            fields:
              - { label: "Imagen Inicial (Ideal: 800x600px en WebP)", name: "imagen", widget: "image" }
              - { label: "Texto Descriptivo", name: "descripcion", widget: "text" }
          - label: "Nivel Primaria"
            name: "nivel_primaria"
            widget: "object"
            fields:
              - { label: "Imagen Primaria (Ideal: 800x600px en WebP)", name: "imagen", widget: "image" }
              - { label: "Texto Descriptivo", name: "descripcion", widget: "text" }
          - label: "Nivel Secundaria"
            name: "nivel_secundaria"
            widget: "object"
            fields:
              - { label: "Imagen Secundaria (Ideal: 800x600px en WebP)", name: "imagen", widget: "image" }
              - { label: "Texto Descriptivo", name: "descripcion", widget: "text" }

  - name: "paginas"
    label: "Páginas del Sitio"
    files:
      - file: "data/admision.json"
        label: "Página de Admisión"
        name: "admision"
        fields:
          - { label: "Título de Admisión", name: "titulo", widget: "string" }
          - { label: "Descripción General", name: "descripcion", widget: "text" }
          - label: "Charla Informativa"
            name: "charla"
            widget: "object"
            fields:
              - { label: "Imagen Charla (Ideal: 800x600px WebP)", name: "imagen", widget: "image" }
              - { label: "Título de Charla", name: "titulo", widget: "string" }
              - { label: "Descripción", name: "descripcion", widget: "text" }
              - { label: "Fecha", name: "fecha", widget: "string" }
              - { label: "Hora", name: "hora", widget: "string" }
              - { label: "Lugar", name: "lugar", widget: "string" }
          - label: "Requisitos de Edad"
            name: "requisitos"
            widget: "object"
            fields:
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Descripción", name: "descripcion", widget: "text" }
              - { label: "Aviso Extra", name: "extra", widget: "text" }
          - label: "Modalidades de Ingreso"
            name: "modalidades"
            widget: "object"
            fields:
              - { label: "Título", name: "titulo", widget: "string" }
              - label: "Lista de Modalidades"
                name: "lista"
                widget: "list"
                collapsed: true
                summary: "{{fields.titulo}}"
                fields:
                  - { label: "Título Modalidad", name: "titulo", widget: "string" }
                  - { label: "Descripción", name: "descripcion", widget: "text" }
          - label: "Traslados e Idiomas"
            name: "traslados"
            widget: "object"
            fields:
              - { label: "Título Sección", name: "titulo", widget: "string" }
              - { label: "Descripción Traslados", name: "descripcion", widget: "text" }
              - { label: "Título de Evaluación", name: "evaluacion_titulo", widget: "string" }
              - { label: "Descripción de Evaluación", name: "evaluacion_descripcion", widget: "text" }
              - { label: "Detalle de Nivelación", name: "evaluacion_detalle", widget: "text" }

      - file: "data/nivel_inicial.json"
        label: "Nivel Inicial (Contenido Detallado)"
        name: "nivel_inicial"
        fields:
          - { label: "Lema / Frase Introductoria", name: "lema", widget: "text" }
          - { label: "Imagen Destacada (Ideal: 800x600px WebP)", name: "imagen", widget: "image" }
          - label: "Secciones Informativas (Metodología, Aulas, etc.)"
            name: "secciones"
            widget: "list"
            collapsed: true
            summary: "{{fields.titulo}}"
            fields:
              - { label: "Icono", name: "icon", widget: "string", hint: "Nombre del icono de FontAwesome. Ej: fas fa-puzzle-piece" }
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Descripción", name: "descripcion", widget: "text" }

      - file: "data/nivel_primaria.json"
        label: "Nivel Primaria (Contenido Detallado)"
        name: "nivel_primaria"
        fields:
          - { label: "Lema / Frase Introductoria", name: "lema", widget: "text" }
          - { label: "Imagen Destacada (Ideal: 800x600px WebP)", name: "imagen", widget: "image" }
          - label: "Secciones Informativas"
            name: "secciones"
            widget: "list"
            collapsed: true
            summary: "{{fields.titulo}}"
            fields:
              - { label: "Icono", name: "icon", widget: "string", hint: "Nombre del icono de FontAwesome. Ej: fas fa-search" }
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Descripción", name: "descripcion", widget: "text" }
          - label: "Sección Especial de Inglés"
            name: "seccion_ingles"
            widget: "object"
            fields:
              - { label: "Imagen Inglés (Ideal: 600x400px WebP)", name: "imagen", widget: "image" }
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Descripción", name: "descripcion", widget: "text" }

      - file: "data/nivel_secundaria.json"
        label: "Nivel Secundaria (Contenido Detallado)"
        name: "nivel_secundaria"
        fields:
          - { label: "Lema / Frase Introductoria", name: "lema", widget: "text" }
          - { label: "Imagen Destacada (Ideal: 800x600px WebP)", name: "imagen", widget: "image" }
          - label: "Secciones Informativas"
            name: "secciones"
            widget: "list"
            collapsed: true
            summary: "{{fields.titulo}}"
            fields:
              - { label: "Icono", name: "icon", widget: "string", hint: "Nombre del icono de FontAwesome. Ej: fas fa-globe-americas" }
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Descripción", name: "descripcion", widget: "text" }
          - label: "Sección Especial Bachillerato (IB)"
            name: "seccion_ib"
            widget: "object"
            fields:
              - { label: "Logo IB (Ideal: logoIB.png)", name: "imagen", widget: "image" }
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Descripción", name: "descripcion", widget: "text" }
